spring.application.name=tasks
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tasksdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tasksuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taskspassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
