services:
  postgres:
    image: postgres:16
    container_name: task-app-postgres
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: tasksuser
      POSTGRES_PASSWORD: taskspassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasksuser -d tasksdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
